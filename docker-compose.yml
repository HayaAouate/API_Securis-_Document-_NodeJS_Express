version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: skillhub_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skillhub
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Montage du fichier SQL pour initialiser la DB automatiquement (nommé en alphabétique)
      - ./skillhub.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
